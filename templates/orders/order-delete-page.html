{% extends "base.html" %}
{% block title %}Delete Order #{{ order.id }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
  <div class="card border-danger shadow-sm mt-4">
    <div class="card-body text-center">
      <h2 class="h4 text-danger mb-3">Delete order</h2>
      <p class="mb-2">Are you sure you want to delete:</p>
      <p class="fw-semibold mb-4">Order #{{ order.id }}</p>

      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a class="btn btn-danger" href="#">Yes, delete (later)</a>
        <a class="btn btn-outline-dark" href="{% url 'orders:details' order.id %}">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
