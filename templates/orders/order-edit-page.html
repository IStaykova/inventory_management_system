{% extends "base.html" %}
{% block title %}Edit Order #{{ order.id }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 720px;">
  <div class="card shadow-sm mt-4">
    <div class="card-body text-center">
      <h2 class="h4 mb-2">Edit Order #{{ order.id }}</h2>
      <p class="text-muted mb-4">To be completed</p>

      <a class="btn btn-outline-dark" href="{% url 'orders:details' order.id %}">
        Back to details
      </a>
    </div>
  </div>
</div>
{% endblock %}
