{% extends "base.html" %}
{% block content %}
<div class="container py-3">

  <h3>Order #{{ order.id }}</h3>

  <h5>Items:</h5>
  {% for i in items %}
    <div>{{ i.product.name }} — qty: {{ i.quantity }}</div>
  {% empty %}
    <div class="text-muted">No items yet.</div>
  {% endfor %}

  <hr>

  <h5>Add item</h5>
  <form method="post" action="{% url 'orders:create' order.id %}">
    {% csrf_token %}
    {{ add_form.product }}
    {{ add_form.quantity }}
    <button class="btn btn-primary btn-sm" type="submit">Add</button>
  </form>

</div>
{% endblock %}
