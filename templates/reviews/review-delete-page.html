{% extends 'base.html' %}
{% block content %}
    <div class="container py-3" style="max-width: 700px;">
  <div class="card">
    <div class="card-body">
      <h4>Delete review?</h4>
      <p class="text-muted mb-4">This cannot be undone.</p>

      <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'reviews:product_reviews' review.product_id %}">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
