{% extends 'base.html' %}
{% block content %}

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="mb-4">
                <a href="{% url 'accounts:login' %}" class="text-dark text-decoration-none fs-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
            </div>

            <h1 class="fw-bold text-center mb-4">Forgotten password</h1>

            <p class="text-secondary fs-5 mb-4">
                Please enter the e-mail address you are registered with on the website
                and you will receive a link to generate a new password.
            </p>

            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="{{ form.email.id_for_label }}" class="form-label fw-semibold">
                        Email *
                    </label>
                    {{ form.email }}
                </div>

                <button type="submit" class="btn btn-dark w-100 py-3 text-uppercase fw-semibold">
                    Send
                </button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
