{% extends "base.html" %}
{% block content %}

<div class="container py-4">
  <div class="card h-100 position-relative">
    <div class="badge bg-dark text-white position-absolute" style="top: 0.5rem; right: 0.5rem">Sale</div>

    <div class="row g-10">
      <div class="col-md-5">
        <img class="img-fluid w-100 h-100"
             style="object-fit: cover;"
             src="https://m.media-amazon.com/images/I/71CFb5pcRBS._AC_UF1000,1000_QL80_.jpg"
             alt="{{ product.name }}">
      </div>

      <div class="col-md-7">
        <div class="card-body position-sticky">
          <h3 class="card-title fw-bolder">{{ product.name }}</h3>
          <p class="card-text text-muted mb-2">{{ product.description }}</p>
          <div class="text-muted small mb-2">Quantity: {{ product.stock_quantity }}</div>
          <div class="mt-2">
            <span class="fw-bold fs-5">${{ product.price }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="px-3 pb-3 pt-2 d-flex justify-content-center gap-2">
      <a class="btn btn-sm btn-outline-primary" href="#">Edit</a>
      <a class="btn btn-sm btn-outline-danger" href="#">Delete</a>
      <a class="btn btn-sm btn-outline-dark" href="{% url 'products:home' %}">Back</a>
    </div>

  </div>
</div>

{% endblock %}
