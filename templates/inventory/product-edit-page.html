{% extends "base.html" %}
{% block header_subtitle %}Edit product{% endblock %}

{% block content %}
<div class="container py-4">
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Product</button>
    <a href="{% url 'products:home' %}" class="btn btn-dark">Back</a>
</form>
</div>
{% endblock %}
